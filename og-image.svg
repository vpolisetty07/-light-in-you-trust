<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#161310"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#c8551c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c8551c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="280" cy="315" r="380" fill="url(#glow)"/>

  <!-- hairline frame -->
  <rect x="48" y="48" width="1104" height="534" rx="6" fill="none" stroke="#c8551c" stroke-width="1" opacity="0.4"/>
  <rect x="56" y="56" width="1088" height="518" rx="3" fill="none" stroke="#b08856" stroke-width="0.5" opacity="0.3"/>

  <!-- L monogram (left) -->
  <g transform="translate(180, 215)">
    <circle cx="100" cy="100" r="92" fill="none" stroke="#c8551c" stroke-width="1.2" opacity="0.7"/>
    <circle cx="100" cy="100" r="82" fill="none" stroke="#b08856" stroke-width="0.5" opacity="0.4"/>
    <!-- serif L -->
    <g fill="#f8f5ee">
      <path d="M62 50 L102 50 L102 60 L91 60 L91 148 L121 148 L121 138 L131 138 L131 162 L62 162 L62 152 L74 152 L74 60 L62 60 Z"/>
    </g>
    <!-- spark -->
    <circle cx="138" cy="64" r="10" fill="#c8551c"/>
    <circle cx="138" cy="64" r="20" fill="#c8551c" opacity="0.22"/>
  </g>

  <!-- text block (right) -->
  <g transform="translate(440, 195)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="16" font-weight="700" letter-spacing="6" fill="#c8551c">A REGISTERED CHARITABLE TRUST</text>

    <text x="0" y="90" font-family="'Cormorant Garamond', Georgia, serif" font-size="98" font-weight="500" fill="#f8f5ee" letter-spacing="-2">Light in You</text>

    <text x="0" y="138" font-family="Inter, sans-serif" font-size="20" font-weight="600" letter-spacing="16" fill="#b08856">T  R  U  S  T</text>

    <line x1="0" y1="180" x2="100" y2="180" stroke="#c8551c" stroke-width="1.5"/>

    <text x="0" y="230" font-family="'Cormorant Garamond', Georgia, serif" font-size="34" font-style="italic" fill="#d8cdbb">Kindness, in action.</text>

    <text x="0" y="282" font-family="Inter, sans-serif" font-size="17" font-weight="400" fill="#8d8478" letter-spacing="0.5">Medical Camps  ·  Meals for the Elderly  ·  Education for Children</text>
  </g>

  <text x="600" y="568" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" letter-spacing="5" fill="#c8551c">LIGHTINYOUTRUST.ORG</text>
</svg>
